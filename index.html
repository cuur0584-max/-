<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Log V10 - 永久編號統計版</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --red: #ff3b30;
            --green: #4cd964;
            --yellow: #ffcc00;
            --blue: #007aff;
            --purple: #af52de;
            --text: #ffffff;
            --text-dim: #555555;
            --selected-bg: #1a1a00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        .header {
            height: 12%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        #clock { font-size: 2rem; font-weight: 800; font-family: monospace; margin: 0; }
        #total-stats { font-size: 0.8rem; color: var(--blue); margin-top: 4px; font-weight: bold; }

        .log-container {
            flex: 1;
            overflow-y: auto;
            margin: 10px 0;
            padding: 5px;
            background: var(--card-bg);
            border-radius: 15px;
        }

        .log-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            font-family: monospace;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .log-item.selected {
            background: var(--selected-bg);
            border-left: 4px solid var(--yellow);
        }

        .log-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .log-no { color: var(--text-dim); margin-right: 10px; font-size: 0.85rem; font-weight: bold; }
        .log-name { color: var(--yellow); font-size: 0.9rem; margin-top: 4px; font-weight: normal; }
        .red-text { color: var(--red); font-weight: bold; }
        .green-text { color: var(--green); font-weight: bold; }

        /* 控制面板 */
        .control-panel {
            background: #151515;
            padding: 8px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 0.8fr 0.8fr 1.2fr 0.8fr 0.8fr; 
            gap: 5px;
            align-items: center;
            border: 1px solid #333;
        }

        .ctrl-btn {
            background: #222;
            color: #ccc;
            border: none;
            padding: 12px 2px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .ctrl-btn:active { background: #444; }
        .btn-mic { color: var(--purple); border: 1px solid var(--purple); }
        .mic-active { animation: mic-pulse 1.5s infinite; background: var(--purple) !important; color: white !important; }
        @keyframes mic-pulse {
            0% { box-shadow: 0 0 0 0 rgba(175, 82, 222, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(175, 82, 222, 0); }
            100% { box-shadow: 0 0 0 0 rgba(175, 82, 222, 0); }
        }

        .footer {
            height: 18%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        .main-btn {
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-btn:active { transform: scale(0.95); }
        .btn-red { background: linear-gradient(135deg, #d32f2f, #f44336); }
        .btn-green { background: linear-gradient(135deg, #388e3c, #4caf50); }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="total-stats">目前累計總數: <span id="global-count">0</span> 次</div>
    </div>

    <div class="log-container" id="log-list"></div>

    <div class="control-panel">
        <button class="ctrl-btn" onclick="adjustTime(-1)">-1s</button>
        <button class="ctrl-btn" onclick="adjustTime(1)">+1s</button>
        <button id="mic-btn" class="ctrl-btn btn-mic" onclick="startVoiceNaming()">🎙 命名</button>
        <button class="ctrl-btn" onclick="exportData()">📤 匯出</button>
        <button class="ctrl-btn" style="color:var(--red)" onclick="deleteSelected()">🗑 刪除</button>
    </div>

    <div class="footer">
        <button class="main-btn btn-red" onclick="addRecord('red')">🔴 紅燈</button>
        <button class="main-btn btn-green" onclick="addRecord('green')">🟢 綠燈</button>
    </div>

    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>

<script>
    // 讀取現有紀錄與全局編號
    let records = JSON.parse(localStorage.getItem('traffic_v10_data')) || [];
    let globalCounter = parseInt(localStorage.getItem('traffic_global_id')) || 1;
    let selectedIndex = -1;

    // 語音辨識初始化
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            if (selectedIndex !== -1) {
                records[selectedIndex].name = e.results[0][0].transcript;
                saveData(); renderLogs();
            }
            stopMicUI();
        };
        recognition.onerror = stopMicUI;
        recognition.onend = stopMicUI;
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();

    function renderLogs() {
        const list = document.getElementById('log-list');
        list.innerHTML = '';
        document.getElementById('global-count').innerText = globalCounter - 1;

        records.forEach((rec, index) => {
            const timeStr = new Date(rec.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
            const div = document.createElement('div');
            div.className = `log-item ${selectedIndex === index ? 'selected' : ''}`;
            div.onclick = () => { selectedIndex = index; renderLogs(); };
            
            const colorClass = rec.type === 'red' ? 'red-text' : 'green-text';
            const label = rec.type === 'red' ? '紅燈亮' : '綠燈亮';
            const nameLabel = rec.name ? `<div class="log-name">📍 ${rec.name}</div>` : '';

            div.innerHTML = `
                <div class="log-row">
                    <span><span class="log-no">SN:${rec.sn}</span><span class="${colorClass}">${label}</span></span>
                    <span class="${colorClass}">${timeStr}</span>
                </div>
                ${nameLabel}
            `;
            list.appendChild(div);
        });
    }

    function addRecord(type) {
        // 分配當前全局編號並增加計數器
        records.push({ 
            sn: globalCounter++, 
            type: type, 
            timestamp: Date.now(), 
            name: "" 
        });
        
        selectedIndex = records.length - 1;
        saveData();
        renderLogs();
        document.getElementById('log-list').scrollTop = document.getElementById('log-list').scrollHeight;
        
        const beep = document.getElementById('beep-sound');
        beep.currentTime = 0; beep.play().catch(()=>{});
        if (navigator.vibrate) navigator.vibrate(60);
    }

    function startVoiceNaming() {
        if (selectedIndex === -1 || !recognition) return alert(selectedIndex === -1 ? "請選取紀錄" : "不支援語音");
        document.getElementById('mic-btn').classList.add('mic-active');
        document.getElementById('mic-btn').innerText = "🎧 聆聽中";
        recognition.start();
    }

    function stopMicUI() {
        document.getElementById('mic-btn').classList.remove('mic-active');
        document.getElementById('mic-btn').innerText = "🎙 命名";
    }

    function deleteSelected() {
        if (selectedIndex === -1) return;
        if (confirm(`刪除流水號 SN:${records[selectedIndex].sn} 的紀錄嗎？\n(注意：編號將不會被重新使用)`)) {
            records.splice(selectedIndex, 1);
            selectedIndex = records.length > 0 ? records.length - 1 : -1;
            saveData(); renderLogs();
        }
    }

    function adjustTime(sec) {
        if (selectedIndex === -1) return;
        records[selectedIndex].timestamp += (sec * 1000);
        saveData(); renderLogs();
    }

    function exportData() {
        if (records.length === 0) return alert("尚無紀錄");
        let txt = `--- 紅綠燈紀錄 (總發放編號至 ${globalCounter-1}) ---\n`;
        records.forEach(r => {
            const time = new Date(r.timestamp).toLocaleTimeString('zh-TW', { hour12: false });
            txt += `SN:${r.sn} ${r.type==='red'?'紅燈':'綠燈'} ${time}${r.name?' ['+r.name+']':''}\n`;
        });
        navigator.clipboard.writeText(txt).then(() => alert("✅ 數據已複製！包含永久流水號。"));
    }

    function saveData() {
        localStorage.setItem('traffic_v10_data', JSON.stringify(records));
        localStorage.setItem('traffic_global_id', globalCounter);
    }

    renderLogs();
</script>
</body>
</html>
