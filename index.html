<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Pro V68 - 地圖編輯版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --red: #ff3b30; --green: #4cd964; --yellow: #ffcc00; --blue: #007aff; --purple: #af52de; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; font-family: system-ui, sans-serif; overflow: hidden; }
        
        .version-bar { height: 20px; background: #222; color: var(--blue); font-size: 0.6rem; display: flex; justify-content: center; align-items: center; letter-spacing: 1px; }

        .header { height: 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #333; }
        #clock { font-size: 1.4rem; font-weight: bold; font-family: monospace; }
        #gps-status { font-size: 0.55rem; color: #888; }

        .active-card { height: 26%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 8px; background: var(--card); border-radius: 20px; border: 2px solid #333; position: relative; }
        .flashing { animation: pulse 1s infinite; border-color: var(--yellow); }
        @keyframes pulse { 0%, 100% { background: #111; } 50% { background: #332200; } }
        
        #display-name { font-size: 1.6rem; font-weight: 900; color: var(--yellow); text-decoration: underline; }
        #countdown { font-size: 4.5rem; font-weight: 900; color: #fff; font-family: monospace; line-height: 1; }
        #next-change { font-size: 0.8rem; color: #666; margin-top: 5px; }

        #history-list { flex: 1; overflow-y: auto; background: #080808; border-radius: 15px; margin: 0 8px 8px 8px; border: 1px solid #222; }
        .history-item { padding: 12px 15px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .selected { background: #1a1a00; border-left: 4px solid var(--yellow); }
        .h-sn { color: #555; font-size: 0.7rem; margin-right: 5px; }

        .sys-panel { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 0 8px; margin-bottom: 8px; }
        .sys-btn { background: #151515; border: 1px solid #333; color: #fff; padding: 10px 0; border-radius: 8px; font-size: 0.55rem; font-weight: bold; }

        .footer { height: 28%; display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; justify-items: center; padding-bottom: 10px; }
        .circle-btn { border: none; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.1s; }
        .btn-red { width: 100px; height: 100px; background: linear-gradient(135deg, var(--red), #800); font-size: 1.1rem; font-weight: bold; }
        .btn-green { width: 100px; height: 100px; background: linear-gradient(135deg, var(--green), #060); font-size: 1.1rem; font-weight: bold; }
        .btn-side { width: 60px; height: 60px; background: #222; border: 1px solid #444; font-size: 0.65rem; }

        #map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #map { flex: 1; width: 100%; }

        /* Leaflet 彈窗按鈕樣式 */
        .map-edit-btn { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 5px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body onclick="unlock()">

    <div class="version-bar">TRAFFIC PRO V68 - 地圖點位編輯版</div>

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="gps-status">GPS 待命 - 請點擊螢幕</div>
    </div>

    <div class="active-card" id="main-card">
        <div id="display-name" onclick="manualRename()">尋找定位點</div>
        <div id="countdown">--</div>
        <div id="next-change">請按紅/綠燈紀錄樣本</div>
    </div>

    <div id="history-list"></div>

    <div class="sys-panel">
        <button class="sys-btn" onclick="speakBtn('地圖'); toggleMap()">🗺地圖</button>
        <button class="sys-btn" onclick="speakBtn('存檔'); saveToFile()">💾存檔</button>
        <button class="sys-btn" onclick="speakBtn('讀取'); document.getElementById('fIn').click()">📂讀取</button>
        <button class="sys-btn" onclick="speak('測試正常')">🔊測試</button>
        <button class="sys-btn" style="color:var(--red)" onclick="speakBtn('刪除'); deleteJ()">🗑刪除</button>
        <input type="file" id="fileIn" style="display:none" onchange="importData(this)" accept=".json">
    </div>

    <div class="footer">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="circle-btn btn-side" style="color:var(--purple)" onclick="speakBtn('改名'); doVoice('name')">🎙改名</button>
            <button class="circle-btn btn-side" style="color:var(--blue)" onclick="speakBtn('定位'); gpsFix()">📍定位</button>
        </div>
        <button class="circle-btn btn-red" onclick="logLight('red')">🔴紅亮</button>
        <button class="circle-btn btn-green" onclick="logLight('green')">🟢綠亮</button>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="circle-btn btn-side" style="color:var(--orange)" onclick="speakBtn('週期'); doVoice('cycle')">⏱週期</button>
            <button class="circle-btn btn-side" onclick="speakBtn('刷新'); location.reload()">🔄刷新</button>
        </div>
    </div>

    <div id="map-overlay">
        <div id="map" style="width:100%; height:85%;"></div>
        <button onclick="toggleMap()" style="width:100%; height:15%; background:var(--red); color:#fff; border:none; font-size:1.5rem; font-weight:bold;">返回主畫面</button>
    </div>

    <audio id="silent-audio" loop src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3"></audio>

    <script>
        const DB_KEY = 'TRAFFIC_PRO_V68_DB';
        let junctions = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let globalCounter = junctions.length > 0 ? Math.max(...junctions.map(j => j.sn || 0)) + 1 : 1;
        let userPos = { lat: 23.6, lon: 120.9 }, selectedIndex = -1, predictTimer = null;
        let lMap = null, markerGroup = null, userMarker = null;

        function speak(t) { 
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'zh-TW'; u.rate = 1.5; u.volume = 1.0;
            window.speechSynthesis.speak(u); 
        }
        function speakBtn(n) { speak(n); }

        function unlock() {
            if(document.getElementById('gps-status').innerText.includes("待命")) {
                document.getElementById('gps-status').innerText = "定位中...";
                document.getElementById('silent-audio').play().catch(()=>{});
                speak("程式已啟動");
                initGPS();
            }
        }

        // --- 地圖互動改名核心功能 ---
        window.editNameFromMap = function(idx) {
            const oldName = junctions[idx].name;
            const newName = prompt("修改路口名稱:", oldName);
            if (newName && newName.trim() !== "") {
                junctions[idx].name = newName.trim();
                save();
                render();
                renderMarkers(); // 重新整理地圖上的氣泡
                speak("名稱已更新");
            }
        };

        function renderMarkers() {
            if (!markerGroup) return;
            markerGroup.clearLayers();
            junctions.forEach((j, i) => {
                const marker = L.marker([j.lat, j.lon]).addTo(markerGroup);
                // 建立包含修改按鈕的 HTML 氣泡
                const popupHTML = `
                    <div style="color:black; font-family: sans-serif;">
                        <b>${j.name}</b><br>
                        SN: ${j.sn}<br>
                        週期: ${j.cycle/1000}s<br>
                        <button class="map-edit-btn" onclick="editNameFromMap(${i})">✎ 修改名稱</button>
                    </div>
                `;
                marker.bindPopup(popupHTML);
            });
        }

        function toggleMap() {
            const el = document.getElementById('map-overlay');
            if (el.style.display !== 'flex') {
                el.style.display = 'flex';
                if (!lMap) {
                    lMap = L.map('map').setView([userPos.lat, userPos.lon], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
                    markerGroup = L.layerGroup().addTo(lMap);
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {color: 'var(--blue)', radius: 10, fillOpacity: 0.8}).addTo(lMap);
                }
                lMap.invalidateSize();
                renderMarkers();
            } else el.style.display = 'none';
        }

        // --- 核心邏輯 ---
        function logLight(type) {
            const now = Date.now() - 1000;
            let match = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            if (match === -1) {
                junctions.push({ sn: globalCounter++, name: "新路口", lat: userPos.lat, lon: userPos.lon, cycle: 60000, last: now, lastType: type, logs: [{type, time: now}] });
                selectedIndex = junctions.length - 1;
                speak("建立新路口");
            } else {
                selectedIndex = match;
                junctions[match].last = now;
                junctions[match].lastType = type;
                junctions[match].logs.push({type, time: now});
                if(junctions[match].logs.length > 20) junctions[match].logs.shift();
                autoCalc(match);
                speak("已採樣" + junctions[match].name);
            }
            save(); render(); startPredict();
            if (lMap) renderMarkers();
        }

        function autoCalc(idx) {
            const j = junctions[idx]; if (j.logs.length < 2) return;
            for (let i = j.logs.length-1; i>=1; i--) {
                for (let k = i-1; k>=0; k--) {
                    if (j.logs[i].type === j.logs[k].type) {
                        const d = j.logs[i].time - j.logs[k].time;
                        if (d >= 20000 && d <= 300000) { j.cycle = Math.round(d/1000)*1000; return; }
                    }
                }
            }
        }

        function startPredict() {
            if (predictTimer) clearInterval(predictTimer);
            predictTimer = setInterval(() => {
                if (selectedIndex === -1) return;
                const j = junctions[selectedIndex];
                const elapsed = (Date.now() - j.last) % j.cycle;
                const rem = Math.ceil((j.cycle - elapsed) / 1000);
                const isFirst = elapsed < (j.cycle / 2);
                const curColor = isFirst ? j.lastType : (j.lastType === 'red' ? 'green' : 'red');
                document.getElementById('countdown').innerText = rem;
                document.getElementById('countdown').style.color = (curColor === 'red' ? "var(--red)" : "var(--green)");
                document.getElementById('next-change').innerText = `預計 ${new Date(Date.now() + (j.cycle - elapsed)).toLocaleTimeString()} 轉燈`;
                if (rem <= 10) {
                    document.getElementById('main-card').classList.add('flashing');
                    if (rem === 10) speak("剩十秒");
                } else document.getElementById('main-card').classList.remove('flashing');
            }, 1000);
        }

        function initGPS() {
            navigator.geolocation.watchPosition(p => {
                userPos.lat = p.coords.latitude; userPos.lon = p.coords.longitude;
                document.getElementById('gps-status').innerText = `GPS OK (${Math.round(p.coords.accuracy)}m)`;
                if (userMarker) userMarker.setLatLng([userPos.lat, userPos.lon]);
                autoDetect();
            }, null, { enableHighAccuracy: true });
        }

        function autoDetect() {
            let found = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            if (found !== -1 && found !== selectedIndex) {
                selectedIndex = found; speak("接近" + junctions[found].name); render(); startPredict();
            } else if (found === -1 && selectedIndex !== -1) {
                const d = calcDist(userPos.lat, userPos.lon, junctions[selectedIndex].lat, junctions[selectedIndex].lon);
                if (d > 80) { selectedIndex = -1; render(); clearInterval(predictTimer); }
            }
        }

        function calcDist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(junctions)); }
        function render() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            junctions.slice().reverse().forEach(j => {
                const realIdx = junctions.indexOf(j);
                const item = document.createElement('div');
                item.className = `history-item ${realIdx === selectedIndex ? 'selected' : ''}`;
                item.onclick = () => { selectedIndex = realIdx; render(); startPredict(); speak(j.name); };
                item.innerHTML = `<div><span class="h-sn">#${j.sn}</span><b>${j.name}</b></div><div style="color:var(--green)">${j.cycle/1000}s</div>`;
                list.appendChild(item);
            });
            if (selectedIndex !== -1) document.getElementById('display-name').innerText = junctions[selectedIndex].name;
        }

        function importData(input) {
            const r = new FileReader();
            r.onload = e => {
                try {
                    const d = JSON.parse(e.target.result);
                    junctions = d.records || d;
                    globalCounter = Math.max(...junctions.map(j => j.sn || 0)) + 1;
                    save(); speak("匯入成功"); render();
                    if (lMap) renderMarkers();
                    setTimeout(() => location.reload(), 1000);
                } catch(e) { alert("讀取失敗"); }
            };
            r.readAsText(input.files[0]);
        }

        function saveToFile() {
            const blob = new Blob([JSON.stringify({records: junctions})], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `traffic_v68.json`; a.click();
        }

        function doVoice(m) {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return; let r = new Rec(); r.lang = 'zh-TW';
            r.onresult = e => {
                const res = e.results[0][0].transcript;
                if(m === 'name') { junctions[selectedIndex].name = res; speak("更名為" + res); }
                else { const n = res.match(/\d+/); if(n) { junctions[selectedIndex].cycle = n[0]*1000; speak("週期設定" + n[0] + "秒"); } }
                save(); render(); if(lMap) renderMarkers();
            };
            r.start();
        }

        function manualRename() { if(selectedIndex===-1) return; const n = prompt("改名:", junctions[selectedIndex].name); if(n) { junctions[selectedIndex].name=n; save(); render(); if(lMap) renderMarkers(); } }
        function gpsFix() { if(selectedIndex!==-1){ junctions[selectedIndex].lat=userPos.lat; junctions[selectedIndex].lon=userPos.lon; save(); speak("定位更新"); if(lMap) renderMarkers(); } }
        function deleteJ() { if(selectedIndex!==-1 && confirm("刪除此路口？")){ junctions.splice(selectedIndex,1); selectedIndex=-1; save(); location.reload(); } }

        window.onload = () => { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000); render(); };
    </script>
</body>
</html>
