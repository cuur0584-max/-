<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Pro V37 - 音訊強化版</title>
    <style>
        :root {
            --bg: #000; --card-bg: #111; --red: #ff3b30; --green: #4cd964; 
            --yellow: #ffcc00; --blue: #007aff; --purple: #af52de; --orange: #ff9500; --text: #fff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text); margin: 0; padding: 8px;
            height: 100dvh; display: flex; flex-direction: column;
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }
        .header { height: 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #clock { font-size: 1.4rem; font-weight: 800; font-family: monospace; }
        .active-card {
            height: 45%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 5px 0; background: var(--card-bg); border-radius: 35px; border: 2px solid #333; position: relative; overflow: hidden;
        }
        .active-card.flashing { animation: warning-pulse 1s infinite; border-color: var(--yellow); }
        @keyframes warning-pulse { 0%, 100% { background: #111; } 50% { background: #332200; } }
        #display-name { font-size: 2.2rem; font-weight: 900; color: var(--yellow); text-align: center; }
        #countdown { font-size: 6rem; font-weight: 900; color: var(--orange); font-family: monospace; line-height: 1; }
        .info-row { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .sn-badge { position: absolute; top: 20px; left: 25px; color: #444; font-size: 0.8rem; }
        .sys-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .sys-btn { background: #151515; border: 1px solid #333; color: #888; padding: 10px 0; border-radius: 10px; font-size: 0.6rem; }
        .footer { height: 35%; display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; justify-items: center; gap: 10px; padding-bottom: env(safe-area-inset-bottom, 20px); }
        .circle-btn { border: none; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .circle-btn:active { transform: scale(0.9); }
        .btn-record { width: 130px; height: 130px; background: linear-gradient(135deg, var(--red), #b01a1a); font-size: 1.3rem; font-weight: 900; }
        .btn-side { width: 75px; height: 75px; background: #222; border: 1px solid #444; font-size: 0.75rem; font-weight: bold; }
        .btn-rename { border-color: var(--purple); color: var(--purple); }
        .btn-cycle { border-color: var(--orange); color: var(--orange); }
        .btn-gps { border-color: var(--blue); color: var(--blue); }
        .mic-active { background: #fff !important; color: #000 !important; animation: mic-glow 1.2s infinite; }
        @keyframes mic-glow { 0% { box-shadow: 0 0 10px #fff; } 50% { box-shadow: 0 0 30px #fff; } 100% { box-shadow: 0 0 10px #fff; } }
    </style>
</head>
<body onclick="forceResumeAudio()">

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="gps-info" style="font-size: 0.6rem; color: var(--blue);">GPS 定位中...</div>
    </div>

    <div class="active-card" id="main-card">
        <div class="sn-badge" id="display-sn">SN:--</div>
        <div id="display-name">請先點擊畫面</div>
        <div id="countdown">--</div>
        <div class="info-row" id="display-state">啟動語音系統</div>
    </div>

    <div class="sys-panel">
        <button class="sys-btn" onclick="backupBtn()">💾 備份</button>
        <button class="sys-btn" onclick="importBtn()">📂 匯入</button>
        <button class="sys-btn" onclick="copyBtn()">📋 複製</button>
        <button class="sys-btn" style="color:var(--red)" onclick="deleteBtn()">🗑 刪除</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(this)">
    </div>

    <div class="footer">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-rename" class="circle-btn btn-side btn-rename" onclick="startSpeech('rename')"><span>🎙 改名</span></button>
            <button class="circle-btn btn-side btn-gps" onclick="gpsBtn()"><span>📍 定位</span></button>
        </div>
        <button id="btn-record" class="circle-btn btn-record" onclick="startSpeech('log')"><span>🎙 紀錄</span></button>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-cycle" class="circle-btn btn-side btn-cycle" onclick="startSpeech('cycle')"><span>⏱ 週期</span></button>
            <button class="circle-btn btn-side" style="color:#888" onclick="refreshBtn()"><span>🔄 刷新</span></button>
        </div>
    </div>

    <audio id="sound-beep" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>

<script>
    const MASTER_KEY = 'TRAFFIC_V37_MASTER';
    const MASTER_ID = 'TRAFFIC_V37_ID';
    let records = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
    let globalCounter = parseInt(localStorage.getItem(MASTER_ID)) || 1;
    let selectedIndex = -1, userPos = { lat: 0, lon: 0 }, currentHeading = 0;
    let predictTimer = null, speechMode = 'log';

    // --- 強制喚醒語音引擎 ---
    function forceResumeAudio() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.resume();
        }
        const beep = document.getElementById('sound-beep');
        beep.volume = 0.1; beep.play().catch(()=>{});
        if(document.getElementById('display-name').innerText === "請先點擊畫面") {
            document.getElementById('display-name').innerText = "尋找路口中";
            speak("語音系統已就緒");
        }
    }

    function speak(t, callback) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel(); // 清楚排隊語音
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'zh-TW'; u.volume = 1.0; u.rate = 1.4; u.pitch = 1.0;
        if (callback) u.onend = callback;
        window.speechSynthesis.speak(u);
        
        // 針對部分 Android 的安全機制，如果 2 秒內沒反應，強制觸發 callback
        if (callback) setTimeout(callback, 2000); 
    }

    // --- 按鈕邏輯 ---
    function backupBtn() { speak("備份資料"); backupJSON(); }
    function importBtn() { speak("匯入檔案"); document.getElementById('fileIn').click(); }
    function copyBtn() { speak("複製文字"); exportText(); }
    function deleteBtn() { speak("刪除點位"); deleteSelected(); }
    function gpsBtn() { speak("更新定位"); repositionGPS(); }
    function refreshBtn() { speak("刷新頁面"); setTimeout(()=>location.reload(), 800); }

    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if(recognition) {
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            const res = e.results[0][0].transcript.trim();
            if (speechMode === 'log') processLog(res);
            else if (speechMode === 'cycle') processCycle(res);
            else if (speechMode === 'rename') processRename(res);
        };
        recognition.onend = () => document.querySelectorAll('.circle-btn').forEach(b => b.classList.remove('mic-active'));
    }

    function startSpeech(mode) {
        if(!recognition) return alert("不支援語音辨識");
        speechMode = mode;
        const btnNames = { 'log': '紀錄', 'cycle': '設定週期', 'rename': '路口改名' };
        const btnIds = { 'log': 'btn-record', 'cycle': 'btn-cycle', 'rename': 'btn-rename' };
        
        speak(btnNames[mode], () => {
            document.getElementById(btnIds[mode]).classList.add('mic-active');
            document.getElementById('sound-beep').play().catch(()=>{});
            recognition.start();
        });
    }

    function processLog(text) {
        let type = text.startsWith('紅') ? 'red' : (text.startsWith('綠') ? 'green' : '');
        const name = text.substring(1).trim();
        const now = Date.now() - 4000;
        let isNew = (selectedIndex === -1) || (calcDist(userPos.lat, userPos.lon, records[selectedIndex].lat, records[selectedIndex].lon) > 50);
        if (isNew) {
            records.push({ sn: globalCounter++, name: name || "未命名", lat: userPos.lat, lon: userPos.lon, heading: currentHeading, cycleTime: 60000, lastSync: now, lastSyncType: type });
            selectedIndex = records.length - 1;
        } else {
            if (name) records[selectedIndex].name = name;
            records[selectedIndex].lastSync = now; records[selectedIndex].lastSyncType = type;
        }
        save(); updateUI(); speak(`已紀錄${records[selectedIndex].name}${type==='red'?'紅燈':'綠燈'}`); startPredict();
    }

    function processCycle(text) {
        const num = text.match(/\d+/);
        if (num && selectedIndex !== -1) {
            records[selectedIndex].cycleTime = parseInt(num[0]) * 1000;
            save(); updateUI(); speak(`週期已設定為${num[0]}秒`); startPredict();
        }
    }

    function processRename(text) {
        if (selectedIndex !== -1) { records[selectedIndex].name = text; save(); updateUI(); speak("名稱已更新"); }
    }

    function startPredict() {
        if (predictTimer) clearInterval(predictTimer);
        predictTimer = setInterval(() => {
            if (selectedIndex === -1) return;
            const rec = records[selectedIndex];
            if (!rec.lastSync) return;
            const elapsed = (Date.now() - rec.lastSync) % rec.cycleTime;
            const remain = Math.ceil((rec.cycleTime - elapsed) / 1000);
            document.getElementById('countdown').innerText = remain;
            const card = document.getElementById('main-card');
            if (remain <= 10) {
                card.classList.add('flashing');
                if (remain === 10) speak("剩十秒");
            } else card.classList.remove('flashing');
        }, 1000);
    }

    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            userPos.lat = pos.coords.latitude; userPos.lon = pos.coords.longitude;
            document.getElementById('gps-info').innerText = `GPS 就緒 (${Math.round(pos.coords.accuracy)}m)`;
            autoCheckLocation();
        }, null, { enableHighAccuracy: true });
    }

    window.addEventListener('deviceorientationabsolute', (e) => { currentHeading = e.webkitCompassHeading || (360 - e.alpha); }, true);

    function calcDist(la1, lo1, la2, lo2) {
        const R = 6371e3;
        const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function autoCheckLocation() {
        if (selectedIndex === -1) {
            records.forEach((r, i) => {
                if (calcDist(userPos.lat, userPos.lon, r.lat, r.lon) < 50) {
                    selectedIndex = i; speak("接近" + r.name); updateUI(); startPredict();
                }
            });
        } else if (calcDist(userPos.lat, userPos.lon, records[selectedIndex].lat, records[selectedIndex].lon) > 60) {
            selectedIndex = -1; updateUI(); if(predictTimer) clearInterval(predictTimer);
        }
    }

    function repositionGPS() {
        if (selectedIndex === -1) return;
        records[selectedIndex].lat = userPos.lat; records[selectedIndex].lon = userPos.lon;
        records[selectedIndex].heading = currentHeading; save(); updateUI();
    }

    function updateUI() {
        if (selectedIndex !== -1) {
            const r = records[selectedIndex];
            document.getElementById('display-sn').innerText = `SN:${r.sn}`;
            document.getElementById('display-name').innerText = r.name;
        } else {
            document.getElementById('display-sn').innerText = "SN:--";
            document.getElementById('display-name').innerText = "尋找新路口";
            document.getElementById('countdown').innerText = "--";
        }
    }

    function save() { localStorage.setItem(MASTER_KEY, JSON.stringify(records)); localStorage.setItem(MASTER_ID, globalCounter); }
    function backupJSON() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({records, globalCounter},null,2)],{type:"application/json"})); a.download=`traffic_v37.json`; a.click(); }
    function importJSON(i) { const r = new FileReader(); r.onload=(e)=>{ const d=JSON.parse(e.target.result); records=d.records; globalCounter=d.globalCounter; save(); location.reload(); }; r.readAsText(i.files[0]); }
    function deleteSelected() { if(selectedIndex!==-1 && confirm("刪除？")){ records.splice(selectedIndex,1); selectedIndex=-1; save(); location.reload(); } }
    function exportText() { navigator.clipboard.writeText(records.map(r=>`SN:${r.sn} ${r.name}`).join('\n')).then(()=>alert("已複製")); }

    window.onload = () => { 
        initGPS(); 
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000); 
    };
</script>
</body>
</html>
