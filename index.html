<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Pro V28 - 終極智慧導航版</title>
    <style>
        :root {
            --bg: #000; --card-bg: #111; --red: #ff3b30; --green: #4cd964; 
            --yellow: #ffcc00; --blue: #007aff; --purple: #af52de; --orange: #ff9500; --text: #fff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text); margin: 0; padding: 8px;
            height: 100dvh; display: flex; flex-direction: column;
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }

        /* 頂部狀態欄 */
        .header { height: 12%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        #clock { font-size: 1.6rem; font-weight: 800; font-family: monospace; margin: 0; }
        .status-bar { display: flex; gap: 10px; font-size: 0.65rem; color: var(--blue); margin-top: 4px; }

        /* 中央儀表板 */
        .dashboard {
            height: 32%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 10px 0; background: var(--card-bg); border-radius: 25px; border: 2px solid #333; position: relative; transition: 0.3s;
        }
        .dashboard.flashing { animation: pulse-warning 1s infinite; border-color: var(--yellow); }
        @keyframes pulse-warning { 0%, 100% { background: #111; } 50% { background: #332200; } }
        
        .dir-tag { position: absolute; top: 15px; left: 15px; background: var(--purple); padding: 3px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .j-name { font-size: 1.6rem; font-weight: bold; color: var(--yellow); text-align: center; width: 80%; }
        #countdown { font-size: 5rem; font-weight: 900; color: var(--orange); font-family: monospace; line-height: 1; }
        .phase-text { font-size: 1rem; font-weight: bold; margin-top: 5px; }

        /* 管理按鈕 */
        .sys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px; }
        .sys-btn { background: #151515; border: 1px solid #333; color: #888; padding: 8px 0; border-radius: 8px; font-size: 0.6rem; }

        /* 功能按鈕 */
        .func-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .func-btn { background: #222; border: 1px solid #444; color: #fff; padding: 14px 0; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .btn-mic { border-color: var(--purple); color: var(--purple); }
        .btn-sec { border-color: var(--orange); color: var(--orange); }
        .btn-gps { border-color: var(--blue); color: var(--blue); }
        .active-mic { background: #fff !important; color: #000 !important; }

        /* 主按鈕 */
        .footer { height: 22%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: env(safe-area-inset-bottom, 10px); }
        .main-btn { border: none; border-radius: 25px; color: #fff; font-size: 1.8rem; font-weight: bold; position: relative; }
        .btn-red { background: linear-gradient(135deg, #d32f2f, #f44336); }
        .btn-green { background: linear-gradient(135deg, #388e3c, #4caf50); }
        .mic-dot { position: absolute; top: 10px; right: 10px; width: 10px; height: 10px; background: #fff; border-radius: 50%; opacity: 0; }
        .listening .mic-dot { opacity: 1; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="header">
        <div id="clock">00:00:00</div>
        <div class="status-bar">
            <span id="gps-info">GPS 定位中...</span>
            <span id="dir-info">方位: --</span>
        </div>
    </div>

    <div class="dashboard" id="main-card">
        <div class="dir-tag" id="display-dir">方位</div>
        <div class="j-name" id="display-name">請按燈號同步</div>
        <div id="countdown">--</div>
        <div class="phase-text" id="display-state">READY</div>
    </div>

    <div class="sys-grid">
        <button class="sys-btn" onclick="backupJSON()">💾 備份</button>
        <button class="sys-btn" onclick="document.getElementById('fileIn').click()">📂 匯入</button>
        <button class="sys-btn" onclick="exportText()">📋 複製</button>
        <button class="sys-btn" style="color:var(--red)" onclick="deleteSelected()">🗑 刪除</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(this)">
    </div>

    <div class="func-grid">
        <button id="btn-name" class="func-btn btn-mic" onclick="startSpeech('name')">🎙 命名</button>
        <button id="btn-sec" class="func-btn btn-sec" onclick="startSpeech('seconds')">⏱ 秒數</button>
        <button class="func-btn btn-gps" onclick="reposition()">📍 定位</button>
    </div>

    <div class="footer">
        <button id="red-btn" class="main-btn btn-red" onclick="handleRecord('red')">🔴 紅燈<div class="mic-dot"></div></button>
        <button id="green-btn" class="main-btn btn-green" onclick="handleRecord('green')">🟢 綠燈<div class="mic-dot"></div></button>
    </div>

    <audio id="beep" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>

<script>
    const MASTER_KEY = 'TRAFFIC_V28_FINAL';
    const MASTER_ID = 'TRAFFIC_V28_ID';

    let records = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
    let globalCounter = parseInt(localStorage.getItem(MASTER_ID)) || 1;
    let selectedIndex = -1, userPos = { lat: 0, lon: 0 }, currentHeading = 0;
    let speechMode = 'name', predictTimer = null, lastSpeechTime = 0;

    // --- 語音系統 ---
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if(recognition) {
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            const res = e.results[0][0].transcript;
            if (selectedIndex === -1) return;
            const rec = records[selectedIndex];
            if (speechMode === 'name') {
                rec.name = res; speak("已紀錄 " + res);
            } else {
                const num = res.match(/\d+/);
                if (num) {
                    const s = parseInt(num[0]);
                    if (rec.lastType === 'red') rec.redDur = s * 1000;
                    else rec.greenDur = s * 1000;
                    speak("已輸入");
                }
            }
            save(); refreshUI();
        };
        recognition.onend = () => {
            document.querySelectorAll('.main-btn, .func-btn').forEach(b => b.classList.remove('listening', 'active-mic'));
        };
    }

    function speak(t) {
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'zh-TW'; u.rate = 1.3;
        window.speechSynthesis.speak(u);
    }

    function startSpeech(mode) {
        if(!recognition || Date.now() - lastSpeechTime < 500) return;
        speechMode = mode;
        lastSpeechTime = Date.now();
        const btnId = (mode === 'name') ? 'btn-name' : 'btn-sec';
        if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active-mic');
        recognition.start();
    }

    // --- 方位與定位 ---
    function getDirName(deg) {
        return ["北", "東北", "東", "東南", "南", "西南", "西", "西北"][Math.round(deg / 45) % 8];
    }

    window.addEventListener('deviceorientationabsolute', (e) => {
        currentHeading = e.webkitCompassHeading || (360 - e.alpha);
        document.getElementById('dir-info').innerText = `方位: ${getDirName(currentHeading)} (${Math.round(currentHeading)}°)`;
    }, true);

    function initGPS() {
        navigator.geolocation.watchPosition((p) => {
            userPos.lat = p.coords.latitude; userPos.lon = p.coords.longitude;
            document.getElementById('gps-info').innerText = `GPS 就緒 (${Math.round(p.coords.accuracy)}m)`;
            autoFind();
        }, null, { enableHighAccuracy: true });
    }

    function autoFind() {
        let found = -1;
        records.forEach((r, i) => {
            const d = calcDist(userPos.lat, userPos.lon, r.lat, r.lon);
            const aDiff = Math.abs(r.heading - currentHeading);
            if (d < 40 && (aDiff < 50 || aDiff > 310)) found = i;
        });
        if (found !== -1 && selectedIndex !== found) {
            selectedIndex = found;
            speak("接近路口 " + (records[found].name || ""));
            refreshUI();
        }
    }

    function calcDist(la1, lo1, la2, lo2) {
        const R = 6371e3, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- 核心邏輯：紀錄與智慧修正 ---
    function handleRecord(type) {
        const now = Date.now();
        if (selectedIndex === -1) {
            records.push({ sn: globalCounter++, name: "", lat: userPos.lat, lon: userPos.lon, heading: currentHeading, redDur: 0, greenDur: 0, redSync: 0, greenSync: 0 });
            selectedIndex = records.length - 1;
        }
        
        const rec = records[selectedIndex];
        
        // 智慧自動修正：按鈕動作 vs 語音輸入
        if (type === 'green' && rec.redSync > 0) {
            const measured = now - rec.redSync;
            if (rec.redDur === 0 || Math.abs(measured - rec.redDur) > 3000) {
                const s = Math.round(measured / 1000);
                rec.redDur = s * 1000;
                speak(`自動修正紅燈${s}秒`);
            }
        } else if (type === 'red' && rec.greenSync > 0) {
            const measured = now - rec.greenSync;
            if (rec.greenDur === 0 || Math.abs(measured - rec.greenDur) > 3000) {
                const s = Math.round(measured / 1000);
                rec.greenDur = s * 1000;
                speak(`自動修正綠燈${s}秒`);
            }
        }

        if (type === 'red') rec.redSync = now; else rec.greenSync = now;
        rec.lastType = type;

        save(); refreshUI();
        document.getElementById(type + '-btn').classList.add('listening');
        document.getElementById('beep').play();
        setTimeout(() => startSpeech('name'), 600);
    }

    function runPredictor() {
        if (selectedIndex === -1) return;
        const rec = records[selectedIndex], now = Date.now(), card = document.getElementById('main-card');
        const timer = document.getElementById('countdown'), state = document.getElementById('display-state');

        if (!rec.redDur && !rec.greenDur) return;

        // 24H 循環與相位邏輯
        if (rec.redDur > 0 && rec.greenDur > 0) {
            const cycle = rec.redDur + rec.greenDur;
            const elapsed = (now - rec.redSync) % cycle;
            if (elapsed < rec.redDur) {
                const rem = Math.ceil((rec.redDur - elapsed) / 1000);
                timer.innerText = rem; state.innerText = "🔴 紅燈中"; state.style.color = "var(--red)";
                handleAlert(rem);
            } else {
                const rem = Math.ceil((cycle - elapsed) / 1000);
                timer.innerText = rem; state.innerText = "🟢 綠燈中"; state.style.color = "var(--green)";
                handleAlert(rem);
            }
        } else if (rec.redDur > 0 && rec.redSync > 0) {
            const rem = Math.ceil((rec.redDur - (now - rec.redSync)) / 1000);
            if (rem > 0) { timer.innerText = rem; state.innerText = "🔴 紅燈計時"; handleAlert(rem); }
            else { timer.innerText = "GO"; card.classList.remove('flashing'); }
        }
    }

    let lastA = 0;
    function handleAlert(rem) {
        const c = document.getElementById('main-card');
        if (rem <= 10 && rem > 0) {
            c.classList.add('flashing');
            if (rem === 10 && lastA !== 10) { speak("剩十秒"); lastA = 10; }
        } else {
            c.classList.remove('flashing'); if (rem > 10) lastA = 0;
        }
    }

    function refreshUI() {
        if (selectedIndex === -1) return;
        const r = records[selectedIndex];
        document.getElementById('display-name').innerText = r.name || `SN:${r.sn}`;
        document.getElementById('display-dir').innerText = getDirName(r.heading);
        document.getElementById('main-card').style.borderColor = "var(--blue)";
    }

    function save() { localStorage.setItem(MASTER_KEY, JSON.stringify(records)); localStorage.setItem(MASTER_ID, globalCounter); }
    function reposition() { if(selectedIndex!==-1){ records[selectedIndex].lat=userPos.lat; records[selectedIndex].lon=userPos.lon; records[selectedIndex].heading=currentHeading; speak("更新定位"); save(); } }
    function deleteSelected() { if(selectedIndex!==-1 && confirm("刪除此點？")){ records.splice(selectedIndex,1); selectedIndex=-1; location.reload(); } }
    function backupJSON() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({records, globalCounter},null,2)],{type:"application/json"})); a.download=`traffic_v28.json`; a.click(); }
    function importJSON(i) { const r = new FileReader(); r.onload=(e)=>{ const d=JSON.parse(e.target.result); records=d.records; globalCounter=d.globalCounter; save(); location.reload(); }; r.readAsText(i.files[0]); }
    function exportText() { navigator.clipboard.writeText(records.map(r=>`SN:${r.sn} ${r.name} ${getDirName(r.heading)}`).join('\n')).then(()=>alert("已複製")); }
    function enableAudio() { if(window.speechSynthesis.paused) window.speechSynthesis.resume(); }

    window.onload = () => { initGPS(); setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); 
        runPredictor();
    }, 1000); };
</script>
</body>
</html>
