<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traffic Lite V66</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --card: #111; --red: #ff3b30; --green: #4cd964; --yellow: #ffcc00; --blue: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 8px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 頂部時鐘 */
        .header { height: 10%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        #clock { font-size: 1.5rem; font-weight: bold; font-family: monospace; }
        #gps-status { font-size: 0.6rem; color: var(--blue); }

        /* 主顯示儀表 */
        .active-card { height: 35%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 10px 0; background: var(--card); border-radius: 20px; border: 2px solid #333; position: relative; }
        .flashing { animation: pulse 1s infinite; border-color: var(--yellow); }
        @keyframes pulse { 0%, 100% { background: #111; } 50% { background: #320; } }
        
        #display-name { font-size: 1.8rem; font-weight: 900; color: var(--yellow); }
        #countdown { font-size: 6rem; font-weight: 900; color: #fff; font-family: monospace; line-height: 1; }
        #next-change { font-size: 0.9rem; color: #888; margin-top: 5px; }

        /* 系統按鈕 */
        .sys-panel { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
        .sys-btn { background: #222; border: 1px solid #333; color: #fff; padding: 10px 0; border-radius: 8px; font-size: 0.6rem; font-weight: bold; }
        
        /* 歷史清單 (僅保留簡單顯示) */
        #history-list { flex: 1; overflow-y: auto; background: #080808; border-radius: 10px; margin-bottom: 10px; }
        .history-item { padding: 10px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .selected { background: #1a1a00; border-left: 4px solid var(--yellow); }

        /* 底部圓鈕 */
        .footer { height: 25%; display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; justify-items: center; padding-bottom: 10px; }
        .circle-btn { border: none; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-red { width: 100px; height: 100px; background: linear-gradient(135deg, var(--red), #800); font-size: 1.1rem; font-weight: bold; }
        .btn-green { width: 100px; height: 100px; background: linear-gradient(135deg, var(--green), #060); font-size: 1.1rem; font-weight: bold; }
        .btn-side { width: 60px; height: 60px; background: #222; border: 1px solid #444; font-size: 0.65rem; }

        #map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: none; }
    </style>
</head>
<body onclick="unlock()">

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="gps-status">點擊螢幕啟動系統</div>
    </div>

    <div class="active-card" id="main-card">
        <div id="display-name" onclick="manualRename()">尋找路口中</div>
        <div id="countdown">--</div>
        <div id="next-change">請按紅/綠鈕紀錄</div>
    </div>

    <div id="history-list"></div>

    <div class="sys-panel">
        <button class="sys-btn" onclick="toggleMap()">🗺地圖</button>
        <button class="sys-btn" onclick="saveData()">💾存檔</button>
        <button class="sys-btn" onclick="document.getElementById('fIn').click()">📂讀取</button>
        <button class="sys-btn" onclick="speak('測試成功')">🔊測試</button>
        <button class="sys-btn" style="color:var(--red)" onclick="deleteJ()">🗑刪除</button>
        <input type="file" id="fIn" style="display:none" onchange="importData(this)">
    </div>

    <div class="footer">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="circle-btn btn-side" style="color:var(--purple)" onclick="doVoice('name')">🎙改名</button>
            <button class="circle-btn btn-side" style="color:var(--blue)" onclick="gpsFix()">📍定位</button>
        </div>
        <button class="circle-btn btn-red" onclick="logLight('red')">🔴紅亮</button>
        <button class="circle-btn btn-green" onclick="logLight('green')">🟢綠亮</button>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="circle-btn btn-side" style="color:var(--orange)" onclick="doVoice('cycle')">⏱週期</button>
            <button class="circle-btn btn-side" onclick="location.reload()">🔄刷新</button>
        </div>
    </div>

    <div id="map-overlay">
        <div id="map" style="width:100%; height:85%;"></div>
        <button onclick="toggleMap()" style="width:100%; height:15%; background:var(--red); color:#fff; border:none; font-size:1.5rem;">返回</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB_KEY = 'TRAFFIC_LITE_DB';
        let junctions = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let globalCounter = junctions.length > 0 ? Math.max(...junctions.map(j => j.sn || 0)) + 1 : 1;
        let userPos = { lat: 0, lon: 0 }, selectedIndex = -1, predictTimer = null;

        function speak(t) { 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'zh-TW'; u.rate = 1.5; 
            window.speechSynthesis.cancel(); 
            window.speechSynthesis.speak(u); 
        }

        function unlock() {
            if(document.getElementById('gps-status').innerText.includes("點擊")) {
                document.getElementById('gps-status').innerText = "定位中...";
                speak("程式已啟動");
                initGPS();
            }
        }

        function logLight(type) {
            const now = Date.now() - 500;
            let match = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            
            if (match === -1) {
                junctions.push({ sn: globalCounter++, name: "新路口", lat: userPos.lat, lon: userPos.lon, cycle: 60000, last: now, lastType: type, logs: [{type, time: now}] });
                selectedIndex = junctions.length - 1;
                speak("建立路口");
            } else {
                selectedIndex = match;
                junctions[match].last = now;
                junctions[match].lastType = type;
                junctions[match].logs.push({type, time: now});
                if(junctions[match].logs.length > 10) junctions[match].logs.shift();
                autoCalc(match);
                speak("已同步");
            }
            save(); render(); startPredict();
        }

        function autoCalc(idx) {
            const j = junctions[idx]; if (j.logs.length < 2) return;
            for (let i = j.logs.length-1; i>=1; i--) {
                for (let k = i-1; k>=0; k--) {
                    if (j.logs[i].type === j.logs[k].type) {
                        const d = j.logs[i].time - j.logs[k].time;
                        if (d >= 20000 && d <= 300000) { j.cycle = d; return; }
                    }
                }
            }
        }

        function startPredict() {
            if (predictTimer) clearInterval(predictTimer);
            predictTimer = setInterval(() => {
                if (selectedIndex === -1) return;
                const j = junctions[selectedIndex];
                const elapsed = (Date.now() - j.last) % j.cycle;
                const rem = Math.ceil((j.cycle - elapsed) / 1000);
                const isFirst = elapsed < (j.cycle / 2);
                const curColor = isFirst ? j.lastType : (j.lastType === 'red' ? 'green' : 'red');
                
                document.getElementById('countdown').innerText = rem;
                document.getElementById('countdown').style.color = (curColor === 'red' ? "var(--red)" : "var(--green)");
                document.getElementById('next-change').innerText = `預計 ${new Date(Date.now() + (j.cycle - elapsed)).toLocaleTimeString()} 轉燈`;

                if (rem <= 10) {
                    document.getElementById('main-card').classList.add('flashing');
                    if (rem === 10) speak("剩十秒");
                } else document.getElementById('main-card').classList.remove('flashing');
            }, 1000);
        }

        function initGPS() {
            navigator.geolocation.watchPosition(p => {
                userPos.lat = p.coords.latitude; userPos.lon = p.coords.longitude;
                document.getElementById('gps-status').innerText = `GPS OK (${Math.round(p.coords.accuracy)}m)`;
                autoDetect();
            }, null, { enableHighAccuracy: true });
        }

        function autoDetect() {
            let found = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            if (found !== -1 && found !== selectedIndex) {
                selectedIndex = found; speak("抵達 " + junctions[found].name); render(); startPredict();
            } else if (found === -1 && selectedIndex !== -1) {
                const d = calcDist(userPos.lat, userPos.lon, junctions[selectedIndex].lat, junctions[selectedIndex].lon);
                if (d > 80) { selectedIndex = -1; render(); clearInterval(predictTimer); }
            }
        }

        function calcDist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(junctions)); }
        function render() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            junctions.slice().reverse().forEach(j => {
                const item = document.createElement('div');
                item.className = `history-item ${junctions.indexOf(j) === selectedIndex ? 'selected' : ''}`;
                item.innerHTML = `<div>#${j.sn} <b>${j.name}</b></div><div>${j.cycle/1000}s</div>`;
                item.onclick = () => { selectedIndex = junctions.indexOf(j); render(); startPredict(); };
                list.appendChild(item);
            });
            if (selectedIndex !== -1) document.getElementById('display-name').innerText = junctions[selectedIndex].name;
        }

        function importData(input) {
            const r = new FileReader();
            r.onload = e => {
                const d = JSON.parse(e.target.result);
                junctions = d.records || d;
                save(); location.reload();
            };
            r.readAsText(input.files[0]);
        }

        function saveToFile() {
            const blob = new Blob([JSON.stringify({records: junctions})], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `traffic_lite.json`; a.click();
        }

        let lMap = null;
        function toggleMap() {
            const el = document.getElementById('map-overlay');
            if (el.style.display !== 'block') {
                el.style.display = 'block';
                if (!lMap) {
                    lMap = L.map('map').setView([userPos.lat, userPos.lon], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
                }
                lMap.invalidateSize();
            } else el.style.display = 'none';
        }

        function doVoice(m) {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return; let r = new Rec(); r.lang = 'zh-TW';
            r.onresult = e => {
                const res = e.results[0][0].transcript;
                if(m === 'name') junctions[selectedIndex].name = res;
                else { const n = res.match(/\d+/); if(n) junctions[selectedIndex].cycle = n[0]*1000; }
                save(); render();
            };
            r.start();
        }

        function manualRename() { if(selectedIndex===-1) return; const n = prompt("改名:", junctions[selectedIndex].name); if(n) { junctions[selectedIndex].name=n; save(); render(); } }
        function gpsFix() { if(selectedIndex!==-1){ junctions[selectedIndex].lat=userPos.lat; junctions[selectedIndex].lon=userPos.lon; save(); speak("定位更新"); } }
        function deleteJ() { if(selectedIndex!==-1 && confirm("刪除？")){ junctions.splice(selectedIndex,1); selectedIndex=-1; save(); location.reload(); } }

        window.onload = () => { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000); render(); };
    </script>
</body>
</html>
