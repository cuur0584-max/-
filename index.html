<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Pro V69 - 採樣預測版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --red: #ff3b30; --green: #4cd964; --yellow: #ffcc00; --blue: #007aff; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; font-family: system-ui, sans-serif; overflow: hidden; }
        
        .version-bar { height: 20px; background: #222; color: var(--blue); font-size: 0.6rem; display: flex; justify-content: center; align-items: center; }

        .header { height: 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #333; }
        #clock { font-size: 1.4rem; font-weight: bold; font-family: monospace; }

        /* 主儀表 */
        .active-card { height: 28%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 8px; background: var(--card); border-radius: 25px; border: 2px solid #333; transition: 0.3s; }
        .active-card.in-range { border-color: var(--blue); }
        .flashing { animation: warning 1s infinite; }
        @keyframes warning { 0%, 100% { background: #111; } 50% { background: #320; border-color: var(--yellow); } }
        
        #display-name { font-size: 1.6rem; font-weight: 900; color: var(--yellow); text-decoration: underline; margin-bottom: 5px; }
        #countdown-label { font-size: 1rem; font-weight: bold; }
        #countdown { font-size: 5rem; font-weight: 900; font-family: monospace; line-height: 1; }

        /* 4. 目前路口專屬時間清單 */
        #local-log-list { flex: 1; overflow-y: auto; background: #080808; border-radius: 15px; margin: 0 8px 8px 8px; border: 1px solid #222; }
        .log-item { padding: 10px 15px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .log-red { color: var(--red); }
        .log-green { color: var(--green); }

        .sys-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 0 8px; margin-bottom: 8px; }
        .sys-btn { background: #151515; border: 1px solid #333; color: #fff; padding: 10px 0; border-radius: 8px; font-size: 0.6rem; font-weight: bold; }

        .footer { height: 26%; display: grid; grid-template-columns: 1fr 1.5fr 1.5fr 1fr; align-items: center; justify-items: center; padding-bottom: 10px; }
        .circle-btn { border: none; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-red { width: 90px; height: 90px; background: linear-gradient(135deg, var(--red), #800); font-size: 1.2rem; font-weight: bold; }
        .btn-green { width: 90px; height: 90px; background: linear-gradient(135deg, var(--green), #060); font-size: 1.2rem; font-weight: bold; }
        .btn-side { width: 55px; height: 50px; background: #222; border: 1px solid #444; font-size: 0.6rem; }

        #map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; }
    </style>
</head>
<body onclick="unlock()">

    <div class="version-bar">TRAFFIC PRO V69 - 數據採樣預測版</div>

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="gps-status" style="font-size: 0.6rem; color: #666;">等待啟動...</div>
    </div>

    <div class="active-card" id="main-card">
        <div id="display-name" onclick="manualRename()">尋找路口中</div>
        <div id="countdown-label">請按紅/綠燈紀錄</div>
        <div id="countdown">--</div>
    </div>

    <!-- 5. 畫面中央的時間紀錄清單 -->
    <div id="local-log-list"></div>

    <div class="sys-panel">
        <button class="sys-btn" style="color:var(--blue)" onclick="toggleMap()">🗺地圖</button>
        <button class="sys-btn" style="color:var(--yellow)" onclick="saveToFile()">💾存檔</button>
        <button class="sys-btn" onclick="document.getElementById('fIn').click()">📂讀取</button>
        <button class="sys-btn" style="color:var(--red)" onclick="clearDB()">🚫清空</button>
        <input type="file" id="fIn" style="display:none" onchange="importData(this)" accept=".json">
    </div>

    <div class="footer">
        <button class="circle-btn btn-side" style="color:var(--purple)" onclick="doVoice('name')">🎙改名</button>
        <button class="circle-btn btn-red" onclick="logLight('red')">🔴紅亮</button>
        <button class="circle-btn btn-green" onclick="logLight('green')">🟢綠亮</button>
        <button class="circle-btn btn-side" style="color:var(--blue)" onclick="gpsFix()">📍定位</button>
    </div>

    <div id="map-overlay">
        <div id="map" style="width:100%; height:85%;"></div>
        <button onclick="toggleMap()" style="width:100%; height:15%; background:var(--red); color:#fff; border:none; font-size:1.5rem; font-weight:bold;">返回</button>
    </div>

    <audio id="silent-audio" loop src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3"></audio>

    <script>
        const DB_KEY = 'TRAFFIC_PRO_V69_DB';
        let junctions = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let globalCounter = junctions.length > 0 ? Math.max(...junctions.map(j => j.sn || 0)) + 1 : 1;
        let userPos = { lat: 23.6, lon: 120.9 }, selectedIndex = -1, predictTimer = null;
        let lMap = null, markerGroup = null, userMarker = null;

        function speak(t) { 
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'zh-TW'; u.rate = 1.6; u.volume = 1.0;
            window.speechSynthesis.speak(u); 
        }

        function unlock() {
            if(document.getElementById('gps-status').innerText.includes("等待")) {
                document.getElementById('gps-status').innerText = "定位中...";
                document.getElementById('silent-audio').play().catch(()=>{});
                speak("程式已啟動");
                initGPS();
            }
        }

        // --- 3 & 4. 紀錄與自動計算邏輯 ---
        function logLight(type) {
            const now = Date.now();
            let match = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            
            if (match === -1) {
                // 1. 新定位點建立
                const newJ = { 
                    sn: globalCounter++, name: "新路口", 
                    lat: userPos.lat, lon: userPos.lon, 
                    logs: [{type, time: now}],
                    cycle: 0, redToGreen: 0, greenToRed: 0
                };
                junctions.push(newJ);
                selectedIndex = junctions.length - 1;
                speak("已紀錄" + (type==='red'?'紅':'綠') + "燈並建立新位點");
            } else {
                // 相同定位點採樣
                selectedIndex = match;
                junctions[match].logs.push({type, time: now});
                if(junctions[match].logs.length > 30) junctions[match].logs.shift();
                calculateIntelligence(match);
                speak("已紀錄" + junctions[match].name + (type==='red'?'紅':'綠') + "燈時間");
            }
            save(); renderLocalLogs(); startPredict();
            if (lMap) renderMarkers();
        }

        // 智慧計算循環與間隔
        function calculateIntelligence(idx) {
            const j = junctions[idx];
            if (j.logs.length < 2) return;

            const last = j.logs[j.logs.length - 1];
            const prev = j.logs[j.logs.length - 2];

            // 計算紅變綠的間隔
            if (prev.type === 'red' && last.type === 'green') {
                j.redToGreen = last.time - prev.time;
            }
            // 計算綠變紅的間隔
            if (prev.type === 'green' && last.type === 'red') {
                j.greenToRed = last.time - prev.time;
            }

            // 計算總循環 (紅到紅 或 綠到綠)
            for (let i = j.logs.length - 1; i >= 1; i--) {
                for (let k = i - 1; k >= 0; k--) {
                    if (j.logs[i].type === j.logs[k].type) {
                        const diff = j.logs[i].time - j.logs[k].time;
                        if (diff >= 20000 && diff <= 300000) {
                            j.cycle = diff;
                            return;
                        }
                    }
                }
            }
        }

        function startPredict() {
            if (predictTimer) clearInterval(predictTimer);
            predictTimer = setInterval(() => {
                if (selectedIndex === -1) return;
                const j = junctions[selectedIndex];
                if (!j.cycle || j.logs.length === 0) return;

                const lastLog = j.logs[j.logs.length - 1];
                const elapsed = (Date.now() - lastLog.time) % j.cycle;
                const remain = Math.ceil((j.cycle - elapsed) / 1000);

                // 根據上一次按下的燈號判定現在顏色
                let currentType = lastLog.type;
                if (lastLog.type === 'red' && j.redToGreen && elapsed > j.redToGreen) currentType = 'green';
                if (lastLog.type === 'green' && j.greenToRed && elapsed > j.greenToRed) currentType = 'red';

                const timerEl = document.getElementById('countdown');
                timerEl.innerText = remain;
                timerEl.style.color = (currentType === 'red' ? "var(--red)" : "var(--green)");
                document.getElementById('countdown-label').innerText = (currentType === 'red' ? "預計紅燈倒數" : "預計綠燈倒數");

                if (remain <= 10) {
                    document.getElementById('main-card').classList.add('flashing');
                    if (remain === 10) speak("預計十秒後變燈");
                } else document.getElementById('main-card').classList.remove('flashing');
            }, 1000);
        }

        // --- 5. 渲染目前路口的時間紀錄清單 ---
        function renderLocalLogs() {
            const list = document.getElementById('local-log-list');
            list.innerHTML = '';
            if (selectedIndex === -1) {
                list.innerHTML = '<div style="text-align:center; padding:20px; color:#444;">無定位點紀錄</div>';
                return;
            }

            const j = junctions[selectedIndex];
            document.getElementById('display-name').innerText = j.name;
            
            // 將紀錄反向顯示 (最新在上)
            [...j.logs].reverse().forEach(l => {
                const item = document.createElement('div');
                item.className = 'log-item';
                const timeStr = new Date(l.time).toLocaleTimeString('zh-TW', {hour12:false});
                const typeText = l.type === 'red' ? '🔴 紅燈亮' : '🟢 綠燈亮';
                const typeClass = l.type === 'red' ? 'log-red' : 'log-green';
                item.innerHTML = `<span class="${typeClass}">${typeText}</span><span>${timeStr}</span>`;
                list.appendChild(item);
            });
        }

        function initGPS() {
            navigator.geolocation.watchPosition(p => {
                userPos.lat = p.coords.latitude; userPos.lon = p.coords.longitude;
                document.getElementById('gps-status').innerText = `GPS 連線中 (${Math.round(p.coords.accuracy)}m)`;
                autoDetect();
            }, null, { enableHighAccuracy: true });
        }

        function autoDetect() {
            let found = junctions.findIndex(j => calcDist(userPos.lat, userPos.lon, j.lat, j.lon) < 50);
            if (found !== -1 && found !== selectedIndex) {
                selectedIndex = found; 
                speak("抵達" + junctions[found].name); 
                renderLocalLogs(); 
                startPredict();
            } else if (found === -1 && selectedIndex !== -1) {
                const d = calcDist(userPos.lat, userPos.lon, junctions[selectedIndex].lat, junctions[selectedIndex].lon);
                if (d > 70) {
                    selectedIndex = -1;
                    renderLocalLogs();
                    clearInterval(predictTimer);
                }
            }
        }

        function calcDist(la1, lo1, la2, lo2) {
            const R = 6371e3;
            const a = Math.sin(((la2-la1)*Math.PI/180)/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(((lo2-lo1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(junctions)); }

        function clearDB() {
            if(confirm("確定要清空所有紀錄重新開始嗎？")) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }

        function manualRename() {
            if(selectedIndex===-1) return;
            const n = prompt("修改路口名稱:", junctions[selectedIndex].name);
            if(n) { junctions[selectedIndex].name = n; save(); renderLocalLogs(); }
        }

        function gpsFix() {
            if(selectedIndex!==-1){
                junctions[selectedIndex].lat = userPos.lat;
                junctions[selectedIndex].lon = userPos.lon;
                save(); speak("定位已更新");
            }
        }

        function toggleMap() {
            const el = document.getElementById('map-overlay');
            if (el.style.display !== 'flex') {
                el.style.display = 'flex';
                if (!lMap) {
                    lMap = L.map('map').setView([userPos.lat, userPos.lon], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
                    markerGroup = L.layerGroup().addTo(lMap);
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {color: 'var(--blue)', radius: 10}).addTo(lMap);
                }
                lMap.invalidateSize();
                renderMarkers();
            } else el.style.display = 'none';
        }

        function renderMarkers() {
            if (!markerGroup) return;
            markerGroup.clearLayers();
            junctions.forEach((j, i) => {
                const m = L.marker([j.lat, j.lon]).addTo(markerGroup);
                m.bindPopup(`<b>${j.name}</b><br>樣本數: ${j.logs.length}<br><button onclick="window.mapRename(${i})">改名</button>`);
            });
        }
        window.mapRename = (i) => { const n = prompt("改名:", junctions[i].name); if(n){ junctions[i].name=n; save(); renderMarkers(); renderLocalLogs(); } };

        function saveToFile() {
            const blob = new Blob([JSON.stringify({records: junctions})], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `traffic_v69.json`; a.click();
        }

        function importData(input) {
            const r = new FileReader();
            r.onload = e => {
                const d = JSON.parse(e.target.result);
                junctions = d.records || d;
                globalCounter = Math.max(...junctions.map(j => j.sn || 0)) + 1;
                save(); location.reload();
            };
            r.readAsText(input.files[0]);
        }

        function doVoice(m) {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return alert("不支援語音");
            let r = new Rec(); r.lang = 'zh-TW';
            r.onresult = e => {
                const res = e.results[0][0].transcript;
                if(m === 'name') { junctions[selectedIndex].name = res; speak("已命名"); }
                save(); renderLocalLogs();
            };
            r.start();
        }

        window.onload = () => { 
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000); 
            renderLocalLogs();
        };
    </script>
</body>
</html>
