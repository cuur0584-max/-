<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Pro V48 - APK 強化版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card-bg: #111; --red: #ff3b30; --green: #4cd964; --yellow: #ffcc00; --blue: #007aff; --purple: #af52de; --orange: #ff9500; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 8px; height: 100dvh; display: flex; flex-direction: column; font-family: system-ui, sans-serif; overflow: hidden; }
        .header { height: 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #222; }
        #clock { font-size: 1.4rem; font-weight: 800; font-family: monospace; }
        .active-card { height: 25%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 5px 0; background: var(--card-bg); border-radius: 25px; border: 2px solid #333; position: relative; }
        .active-card.flashing { animation: warning-pulse 1s infinite; border-color: var(--yellow); }
        @keyframes warning-pulse { 0%, 100% { background: #111; } 50% { background: #332200; } }
        #display-name { font-size: 1.5rem; font-weight: 900; color: var(--yellow); }
        #next-change-time { font-size: 1rem; font-weight: bold; margin-bottom: 2px; }
        #countdown { font-size: 4.5rem; font-weight: 900; color: #fff; font-family: monospace; line-height: 1; }
        .history-container { flex: 1; overflow-y: auto; margin-bottom: 8px; background: #080808; border-radius: 15px; border: 1px solid #222; }
        .history-item { padding: 10px 15px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .history-item.selected { background: #1a1a00; border-left: 4px solid var(--yellow); }
        .sys-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .sys-btn { background: #151515; border: 1px solid #333; color: #fff; padding: 10px 0; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
        .footer { height: 28%; display: grid; grid-template-columns: 1fr 1.5fr 1fr; align-items: center; justify-items: center; padding-bottom: env(safe-area-inset-bottom, 10px); }
        .circle-btn { border: none; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: 0.1s; }
        .btn-main-red { width: 100px; height: 100px; background: linear-gradient(135deg, var(--red), #800); font-size: 1rem; font-weight: 900; }
        .btn-main-green { width: 100px; height: 100px; background: linear-gradient(135deg, var(--green), #060); font-size: 1rem; font-weight: 900; }
        .btn-side { width: 60px; height: 60px; background: #222; border: 1px solid #444; font-size: 0.6rem; font-weight: bold; }
        #settings-overlay, #map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: none; padding: 20px; flex-direction: column; }
        .mic-active { background: #fff !important; color: #000 !important; }
    </style>
</head>
<body onclick="startService()">

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="gps-info" style="font-size: 0.6rem; color: var(--blue);">點擊任何處啟動後台服務</div>
    </div>

    <div class="active-card" id="main-card">
        <div id="display-name">APP 已就緒</div>
        <div id="next-change-time">--:--:--</div>
        <div id="countdown">--</div>
    </div>

    <div class="history-container" id="history-list"></div>

    <div class="sys-panel">
        <button class="sys-btn" style="color:var(--green)" onclick="testAudioBtn()">🔊 測試</button>
        <button class="sys-btn" style="color:var(--orange)" onclick="toggleSettings()">⚙️ 調校</button>
        <button class="sys-btn" style="color:var(--blue)" onclick="toggleMap()">🗺 地圖</button>
        <button class="sys-btn" style="color:var(--yellow)" onclick="saveToFile()">💾 存檔</button>
        <button class="sys-btn" onclick="document.getElementById('fileIn').click()">📂 讀取</button>
        <button class="sys-btn" style="color:var(--red)" onclick="deleteBtn()">🗑 刪除</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(this)">
    </div>

    <div class="footer">
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="circle-btn btn-side" style="color:var(--purple)" onclick="startSpeech('rename')">🎙 改名</button>
            <button class="circle-btn btn-side" style="color:var(--blue)" onclick="gpsBtn()">📍 定位</button>
        </div>
        <button class="circle-btn btn-main-red" onclick="handleLightRecord('red')">🔴 紅燈</button>
        <button class="circle-btn btn-main-green" onclick="handleLightRecord('green')">🟢 綠燈</button>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button id="btn-cycle" class="circle-btn btn-side" style="color:var(--orange)">⏱ 週期</button>
            <button class="circle-btn btn-side" style="color:#888" onclick="location.reload()">🔄 刷新</button>
        </div>
    </div>

    <!-- 調校面板 -->
    <div id="settings-overlay">
        <h2>系統調校</h2>
        <label>按鍵補償 (秒): <input type="number" id="cfg-offset" style="width:100%; padding:10px; margin:10px 0;"></label>
        <label>偵測半徑 (公尺): <input type="number" id="cfg-radius" style="width:100%; padding:10px; margin:10px 0;"></label>
        <button class="sys-btn" style="height:50px; background:var(--blue);" onclick="saveConfig()">儲存</button>
    </div>

    <!-- 地圖面板 -->
    <div id="map-overlay" style="padding:0;">
        <div id="map" style="width:100%; height:85%;"></div>
        <button class="sys-btn" style="height:15%; background:var(--red); font-size:1.5rem;" onclick="toggleMap()">離開地圖</button>
    </div>

    <!-- 關鍵：背景保活音訊 (1秒靜音) -->
    <audio id="silent-audio" loop src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3"></audio>
    <audio id="sound-beep" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>

<script>
    const MASTER_KEY = 'TRAFFIC_MASTER_V48';
    const CONFIG_KEY = 'TRAFFIC_CONFIG_V48';

    let config = JSON.parse(localStorage.getItem(CONFIG_KEY)) || { offset: 0.5, radius: 50, voiceRate: 1.4 };
    let records = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
    let globalCounter = parseInt(localStorage.getItem('TRAFFIC_ID_V48')) || 1;
    let selectedIndex = -1, userPos = { lat: 0, lon: 0 }, currentHeading = 0, predictTimer = null;
    let leafletMap, mapMarkers = [];

    // --- 背景保活與初始化 ---
    function startService() {
        if ('speechSynthesis' in window) window.speechSynthesis.resume();
        const silent = document.getElementById('silent-audio');
        silent.play().catch(e => console.log("等待手動播放"));
        if(document.getElementById('display-name').innerText === "APP 已就緒") {
            speak("系統已啟動，後台守護開啟");
            document.getElementById('display-name').innerText = "尋找路口中";
        }
    }

    function speak(t, cb) {
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'zh-TW'; u.volume = 1.0; u.rate = config.voiceRate;
        if(cb) u.onend = cb;
        window.speechSynthesis.speak(u);
    }

    // --- 核心邏輯 ---
    function handleLightRecord(type) {
        document.getElementById('sound-beep').play().catch(()=>{});
        const syncTime = Date.now() - (config.offset * 1000);
        let isNew = (selectedIndex === -1) || (calcDist(userPos.lat, userPos.lon, records[selectedIndex].lat, records[selectedIndex].lon) > (config.radius + 30));
        
        if (isNew) {
            records.push({ sn: globalCounter++, name: "新路口", lat: userPos.lat, lon: userPos.lon, heading: currentHeading, cycleTime: 60000, lastSync: syncTime, lastSyncType: type });
            selectedIndex = records.length - 1;
            speak(type === 'red' ? "紀錄紅燈" : "紀錄綠燈");
        } else {
            records[selectedIndex].lastSync = syncTime; records[selectedIndex].lastSyncType = type;
            speak("同步");
        }
        saveData(); renderHistory(); startPredict();
    }

    function startPredict() {
        if (predictTimer) clearInterval(predictTimer);
        predictTimer = setInterval(() => {
            if (selectedIndex === -1) return;
            const rec = records[selectedIndex]; if (!rec.lastSync) return;
            const now = Date.now();
            const elapsed = (now - rec.lastSync) % rec.cycleTime;
            const remainMs = rec.cycleTime - elapsed;
            const remainSec = Math.ceil(remainMs / 1000);
            
            const nextChangeTs = now + remainMs;
            const nextTimeStr = new Date(nextChangeTs).toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

            document.getElementById('countdown').innerText = remainSec;
            document.getElementById('next-change-time').innerText = `預計 ${nextTimeStr} 轉燈`;

            const isFirst = elapsed < (rec.cycleTime / 2);
            const activeColor = (rec.lastSyncType === 'red') ? (isFirst ? "var(--red)" : "var(--green)") : (isFirst ? "var(--green)" : "var(--red)");
            document.getElementById('countdown').style.color = activeColor;
            document.getElementById('next-change-time').style.color = activeColor;

            if (remainSec <= 10) {
                document.getElementById('main-card').classList.add('flashing');
                if (remainSec === 10) speak("剩十秒");
            } else document.getElementById('main-card').classList.remove('flashing');
        }, 1000);
    }

    // --- GPS 與偵測 ---
    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            userPos.lat = pos.coords.latitude; userPos.lon = pos.coords.longitude;
            document.getElementById('gps-info').innerText = `GPS 就緒 (精度:${Math.round(pos.coords.accuracy)}m)`;
            autoDetect();
        }, null, { enableHighAccuracy: true });
    }

    function autoDetect() {
        let nearestIdx = -1;
        let minD = 999;
        const earlyR = config.radius + 30; // 提早30公尺
        records.forEach((r, i) => {
            const d = calcDist(userPos.lat, userPos.lon, r.lat, r.lon);
            if (d < earlyR && d < minD) { nearestIdx = i; minD = d; }
        });

        if (nearestIdx !== -1) {
            if (selectedIndex !== nearestIdx) {
                selectedIndex = nearestIdx;
                speak("即將抵達 " + records[selectedIndex].name);
                renderHistory(); startPredict();
            }
        } else if (selectedIndex !== -1 && minD > (config.radius + 60)) {
            selectedIndex = -1; renderHistory(); if(predictTimer) clearInterval(predictTimer);
        }
    }

    function calcDist(la1, lo1, la2, lo2) {
        const R = 6371e3;
        const dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- 系統功能 ---
    function saveData() { localStorage.setItem(MASTER_KEY, JSON.stringify(records)); localStorage.setItem('TRAFFIC_ID_V48', globalCounter); }
    function saveConfig() { 
        config.offset = parseFloat(document.getElementById('cfg-offset').value); 
        config.radius = parseInt(document.getElementById('cfg-radius').value); 
        localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); 
        speak("已存檔"); toggleSettings(); 
    }
    function toggleSettings() {
        const el = document.getElementById('settings-overlay');
        if(el.style.display === 'flex') el.style.display = 'none';
        else { document.getElementById('cfg-offset').value = config.offset; document.getElementById('cfg-radius').value = config.radius; el.style.display = 'flex'; }
    }
    function toggleMap() {
        const el = document.getElementById('map-overlay');
        if (el.style.display !== 'flex') {
            el.style.display = 'flex';
            if (!leafletMap) {
                leafletMap = L.map('map').setView([userPos.lat || 25, userPos.lon || 121], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
            }
            renderMarkers();
        } else el.style.display = 'none';
    }
    function renderMarkers() {
        mapMarkers.forEach(m => leafletMap.removeLayer(m));
        records.forEach(r => mapMarkers.push(L.marker([r.lat, r.lon]).addTo(leafletMap).bindPopup(r.name)));
    }
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        records.slice().reverse().forEach((r) => {
            const idx = records.indexOf(r);
            const item = document.createElement('div');
            item.className = `history-item ${selectedIndex === idx ? 'selected' : ''}`;
            item.onclick = () => { selectedIndex = idx; speak(r.name); renderHistory(); startPredict(); };
            item.innerHTML = `<span>#${r.sn} <b>${r.name}</b></span><span>${r.cycleTime/1000}s</span>`;
            list.appendChild(item);
        });
        if (selectedIndex !== -1) document.getElementById('display-name').innerText = records[selectedIndex].name;
    }

    // --- 啟動 ---
    window.onload = () => {
        initGPS();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }, 1000);
        renderHistory();
    };
</script>
</body>
</html>
