<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Traffic Log V18 - 語音回報版</title>
    <style>
        :root {
            --bg: #000; --card-bg: #111; --red: #ff3b30; --green: #4cd964; 
            --yellow: #ffcc00; --blue: #007aff; --purple: #af52de; --text: #fff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text); margin: 0; padding: 10px;
            height: 100dvh; display: flex; flex-direction: column;
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }
        .header { height: 10%; text-align: center; border-bottom: 1px solid #222; }
        #clock { font-size: 1.8rem; font-weight: 800; font-family: monospace; margin: 0; }
        #predict-info { font-size: 0.7rem; color: var(--yellow); }

        .log-container { flex: 1; overflow-y: auto; margin: 10px 0; background: var(--card-bg); border-radius: 15px; }
        .log-item { padding: 12px 15px; border-bottom: 1px solid #222; font-family: monospace; border-left: 4px solid transparent; transition: 0.3s; }
        .log-item.selected { background: #1a1a1a; border-left-color: var(--blue); }
        
        /* 10秒前閃爍動畫 */
        .log-item.flashing { 
            animation: flash-warning 1s infinite; 
            border-left-color: var(--yellow);
            background: #2a2a00;
        }
        @keyframes flash-warning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; background: #444400; }
        }

        .log-row { display: flex; justify-content: space-between; width: 100%; font-size: 1.1rem; }
        .log-no { color: #555; margin-right: 8px; font-size: 0.8rem; }
        .log-name { color: var(--yellow); font-size: 0.85rem; margin-top: 4px; }
        .red-text { color: var(--red); font-weight: bold; }
        .green-text { color: var(--green); font-weight: bold; }

        .data-panel { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .data-btn { background: #222; border: 1px solid #333; color: #ccc; padding: 10px 0; border-radius: 10px; font-size: 0.7rem; }
        
        .footer { height: 20%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: env(safe-area-inset-bottom, 10px); }
        .main-btn { border: none; border-radius: 20px; color: #fff; font-size: 1.6rem; font-weight: bold; position: relative; }
        .btn-red { background: linear-gradient(135deg, #d32f2f, #f44336); }
        .btn-green { background: linear-gradient(135deg, #388e3c, #4caf50); }
        .mic-indicator { position: absolute; top: 10px; right: 10px; font-size: 0.8rem; opacity: 0; transition: 0.3s; }
        .listening .mic-indicator { opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock">00:00:00</div>
        <div id="predict-info">語音回報已啟動</div>
    </div>

    <div class="log-container" id="log-list"></div>

    <div class="data-panel">
        <button id="manual-mic" class="data-btn" onclick="startRecognition(true)">🎙 補命名</button>
        <button class="data-btn" onclick="adjustTime(-1)">-1s修正</button>
        <button class="data-btn" onclick="adjustTime(1)">+1s修正</button>
        <button class="data-btn" style="color:var(--red)" onclick="deleteSelected()">🗑 刪除</button>
    </div>

    <div class="footer">
        <button id="red-btn" class="main-btn btn-red" onclick="handleRecord('red')">🔴 紅燈<span class="mic-indicator">🎙...</span></button>
        <button id="green-btn" class="main-btn btn-green" onclick="handleRecord('green')">🟢 綠燈<span class="mic-indicator">🎙...</span></button>
    </div>

    <audio id="sound-main" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>
    <audio id="sound-tick" src="https://actions.google.com/sounds/v1/ui/click-20.ogg"></audio>

<script>
    const STORAGE_KEY = 'TRAFFIC_PERMANENT_DATA';
    const ID_KEY = 'TRAFFIC_PERMANENT_ID';

    let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let globalCounter = parseInt(localStorage.getItem(ID_KEY)) || 1;
    let selectedIndex = -1;
    let predictionTimer = null;

    // --- 語音辨識與回報設定 ---
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    let recognition = null;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            const result = e.results[0][0].transcript;
            if (selectedIndex !== -1) {
                records[selectedIndex].name = result;
                saveData(); 
                renderLogs();
                // 成功命名後說出「已紀錄」
                speakText("已紀錄");
                if (records[selectedIndex].type === 'red') checkAndPredict(selectedIndex);
            }
        };
        recognition.onend = () => {
            document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('listening'));
        };
    }

    // 文字轉語音函數 (TTS)
    function speakText(text) {
        if ('speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-TW';
            msg.rate = 1.2; // 語速稍微快一點，比較乾脆
            window.speechSynthesis.speak(msg);
        }
    }

    function startRecognition(isManual = false) {
        if (!recognition) return;
        recognition.start();
    }

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12:false}); }
    setInterval(updateClock, 1000); updateClock();

    function renderLogs() {
        const list = document.getElementById('log-list');
        list.innerHTML = '';
        for (let i = records.length - 1; i >= 0; i--) {
            const rec = records[i];
            const timeStr = new Date(rec.timestamp).toLocaleTimeString('zh-TW', {hour12:false});
            const div = document.createElement('div');
            div.id = `log-${rec.sn}`;
            div.className = `log-item ${selectedIndex === i ? 'selected' : ''}`;
            div.onclick = () => { selectedIndex = i; playSound('tick'); renderLogs(); };
            const c = rec.type === 'red' ? 'red-text' : 'green-text';
            div.innerHTML = `<div class="log-row"><span><span class="log-no">SN:${rec.sn}</span><span class="${c}">${rec.type==='red'?'紅燈亮':'綠燈亮'}</span></span><span class="${c}">${timeStr}</span></div>${rec.name?`<div class="log-name">📍 ${rec.name}</div>`:''}`;
            list.appendChild(div);
        }
    }

    function playSound(type) {
        const audio = document.getElementById(type === 'main' ? 'sound-main' : 'sound-tick');
        audio.currentTime = 0; audio.play().catch(()=>{});
    }

    function handleRecord(type) {
        const sn = globalCounter++;
        records.push({ sn: sn, type: type, timestamp: Date.now() - 2000, name: "" });
        selectedIndex = records.length - 1;
        saveData(); renderLogs();
        document.getElementById(type + '-btn').classList.add('listening');
        playSound('main');
        document.getElementById('log-list').scrollTop = 0;
        setTimeout(() => startRecognition(), 300);
    }

    function checkAndPredict(currentIndex) {
        const currentRec = records[currentIndex];
        if (currentRec.type !== 'red') return;
        let foundDuration = null;
        for (let i = currentIndex - 1; i >= 0; i--) {
            if (records[i].name === currentRec.name && records[i].type === 'green' && i > 0 && records[i-1].type === 'red') {
                foundDuration = records[i].timestamp - records[i-1].timestamp;
                break;
            }
        }
        if (!foundDuration && currentIndex >= 2) {
            for (let i = currentIndex - 1; i >= 1; i--) {
                if (records[i].type === 'green' && records[i-1].type === 'red') {
                    foundDuration = records[i].timestamp - records[i-1].timestamp;
                    break;
                }
            }
        }
        if (foundDuration) {
            const targetTime = currentRec.timestamp + foundDuration;
            startCountdown(currentRec.sn, targetTime);
        }
    }

    function startCountdown(sn, targetTime) {
        if (predictionTimer) clearInterval(predictionTimer);
        predictionTimer = setInterval(() => {
            const now = Date.now();
            const remain = (targetTime - now) / 1000;
            if (remain <= 10 && remain > 0) {
                const el = document.getElementById(`log-${sn}`);
                if (el) el.classList.add('flashing');
                document.getElementById('predict-info').innerText = `⚠️ 準備起步: ${Math.ceil(remain)}s`;
                if (Math.ceil(remain) === 10) speakText("剩十秒");
            } else if (remain <= 0) {
                const el = document.getElementById(`log-${sn}`);
                if (el) el.classList.remove('flashing');
                document.getElementById('predict-info').innerText = "🟢 已變燈";
                clearInterval(predictionTimer);
            }
        }, 1000);
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        localStorage.setItem(ID_KEY, globalCounter);
    }
    function adjustTime(s) { if(selectedIndex !== -1) { records[selectedIndex].timestamp += s*1000; saveData(); renderLogs(); playSound('tick'); } }
    function deleteSelected() { if(selectedIndex !== -1 && confirm("刪除？")) { records.splice(selectedIndex, 1); selectedIndex=-1; saveData(); renderLogs(); } }

    renderLogs();
</script>
</body>
</html>
